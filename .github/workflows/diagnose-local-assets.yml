name: Diagnose local fighter assets

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/diagnose-local-assets.yml"

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'codex/localize-fighter-assets'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Capture Vitest output
        shell: bash
        run: |
          set +e
          npm test > test-output.txt 2>&1
          echo $? > test-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: local-asset-test-diagnostics
          path: |
            test-output.txt
            test-exit-code.txt
          if-no-files-found: error
