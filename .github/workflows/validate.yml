name: Validate V2

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: set -o pipefail && npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log

      - name: Stop after typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Test
        id: test
        continue-on-error: true
        shell: bash
        run: set -o pipefail && npm test 2>&1 | tee test.log

      - name: Upload test diagnostics
        if: steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test.log

      - name: Stop after test failure
        if: steps.test.outcome == 'failure'
        run: exit 1

      - name: Build
        run: npm run build
