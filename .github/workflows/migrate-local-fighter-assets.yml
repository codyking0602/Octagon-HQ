name: One-time local fighter asset migration

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/migrate-local-fighter-assets.yml"

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'codex/localize-fighter-assets'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: codex/localize-fighter-assets
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure migration commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Copy and commit eight validated batches
        shell: bash
        run: |
          set -euo pipefail
          for start in 0 10 20 30 40 50 60 70; do
            if [ "$start" = "0" ]; then
              node scripts/migrate-v1-fighter-assets.mjs --logo --start "$start" --count 10
            else
              node scripts/migrate-v1-fighter-assets.mjs --start "$start" --count 10
            fi

            git add public/assets/app-icon.png public/assets/fighters
            if git diff --cached --quiet; then
              echo "No files were added for batch starting at $start."
              exit 1
            fi

            end=$((start + 9))
            git commit -m "Localize fighter assets batch ${start}-${end}"
            git push origin HEAD:codex/localize-fighter-assets
          done

      - name: Reconcile migrated files
        run: |
          test "$(find public/assets/fighters -maxdepth 1 -type f -name '*.webp' | wc -l)" -eq 160
          test -f public/assets/app-icon.png
          echo "Validated 160 fighter files and the local app icon."
