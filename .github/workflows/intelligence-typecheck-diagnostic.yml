name: Intelligence Typecheck Diagnostic

on:
  push:
    branches:
      - codex/restore-intelligence-verdict-flow-2

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Capture typecheck output
        run: |
          npm run typecheck > typecheck.log 2>&1 || true
          cat typecheck.log
      - name: Upload typecheck output
        uses: actions/upload-artifact@v4
        with:
          name: intelligence-typecheck-output
          path: typecheck.log
