name: Capture V1 ranking inputs

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/capture-v1-ranking-inputs.yml
      - scripts/capture-v1-ranking-inputs.mjs
      - scripts/add-v1-watch-moments.mjs

permissions:
  contents: write

concurrency:
  group: capture-v1-ranking-inputs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: ${{ github.head_ref }}
      INPUT_PATH: src/features/rankings/data/generated/canonical-ranking-inputs-842ba06e.json
    steps:
      - name: Check out V2 branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install V2 dependencies
        run: npm install

      - name: Check out pinned V1 production source
        run: |
          rm -rf .tmp/v1
          git clone --filter=blob:none --no-checkout https://github.com/codyking0602/ufc-goat-rankings.git .tmp/v1
          git -C .tmp/v1 fetch --depth 1 origin 842ba06ea09c4f40723226f4c4dfd35041cb3314
          git -C .tmp/v1 checkout --detach FETCH_HEAD
          test "$(git -C .tmp/v1 rev-parse HEAD)" = "842ba06ea09c4f40723226f4c4dfd35041cb3314"

      - name: Capture canonical V1 inputs
        run: |
          node scripts/capture-v1-ranking-inputs.mjs \
            --v1-dir .tmp/v1 \
            --v1-commit 842ba06ea09c4f40723226f4c4dfd35041cb3314 \
            --output "${INPUT_PATH}"

      - name: Add pinned V1 Watch Moment links
        run: |
          node scripts/add-v1-watch-moments.mjs \
            --v1-dir .tmp/v1 \
            --input "${INPUT_PATH}"

      - name: Normalize generated input data
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          const path = process.env.INPUT_PATH;
          const data = JSON.parse(await readFile(path, 'utf8'));
          delete data.capturedAt;
          await writeFile(path, `${JSON.stringify(data, null, 2)}\n`, 'utf8');
          NODE

      - name: Validate generated input contract
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const path = process.env.INPUT_PATH;
          const data = JSON.parse(await readFile(path, 'utf8'));
          if (data.source.commit !== '842ba06ea09c4f40723226f4c4dfd35041cb3314') throw new Error('Unexpected V1 source commit.');
          if (data.counts.fighters !== 80 || data.fighters.length !== 80) throw new Error('Input dataset must contain exactly 80 fighters.');
          if (data.counts.men !== 65 || data.counts.women !== 15) throw new Error('Input board counts do not reconcile.');
          const names = new Set(data.fighters.map((row) => row.fighter));
          const slugs = new Set(data.fighters.map((row) => row.presentation.slug));
          if (names.size !== 80 || slugs.size !== 80) throw new Error('Input dataset contains duplicate fighters or slugs.');
          for (const fighter of data.fighters) {
            if (!fighter.facts.fights.length) throw new Error(`${fighter.fighter} has no canonical fights.`);
            if (!fighter.judgments.championship || !fighter.judgments.opponentQuality || !fighter.judgments.apex) throw new Error(`${fighter.fighter} is missing judgment inputs.`);
            if (!fighter.presentation.watchUrl) throw new Error(`${fighter.fighter} is missing a Watch Moment URL.`);
            for (const forbidden of ['rank', 'ovr', 'totalScore', 'rawScore', 'championshipScore', 'primeDominanceScore']) {
              if (Object.prototype.hasOwnProperty.call(fighter, forbidden)) throw new Error(`Generated input row stores forbidden calculated field ${forbidden}.`);
            }
          }
          console.log(`Validated ${data.fighters.length} calculation-input fighters.`);
          NODE

      - name: Commit generated input dataset
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add "${INPUT_PATH}"
          if git diff --cached --quiet; then
            echo "Canonical input dataset is unchanged."
            exit 0
          fi
          git commit -m "Add complete canonical ranking inputs"
          git push origin HEAD:${TARGET_BRANCH}
