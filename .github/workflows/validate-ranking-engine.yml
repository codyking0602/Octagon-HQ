name: Validate ranking engine

on:
  push:
    branches:
      - "agent/**"
    paths:
      - .github/workflows/validate-ranking-engine.yml
      - src/features/rankings/engine/**
      - package.json
      - tsconfig.json
      - vite.config.ts
      - vitest.setup.ts
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  validate-ranking-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish exact-head status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            state="success"
            description="Typecheck, tests, and build passed"
          else
            state="failure"
            description="Ranking engine validation failed"
          fi
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$COMMIT_SHA" \
            --data "{\"state\":\"$state\",\"context\":\"ranking-engine/validate\",\"description\":\"$description\"}"
