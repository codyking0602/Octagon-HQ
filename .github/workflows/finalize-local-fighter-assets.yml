name: One-time local fighter asset finalizer

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/finalize-local-fighter-assets.yml"

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'codex/localize-fighter-assets'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: codex/localize-fighter-assets
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Finalize local asset ownership
        run: node scripts/finalize-local-fighter-assets.mjs

      - name: Commit ownership changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/config/brand.ts src/features/rankings/rankingModel.ts src/features/rankings/fighterAssets.test.ts docs/HANDOFF.md docs/RANKINGS-MIGRATION.md
          git commit -m "Switch V2 to local fighter assets"
          git push origin HEAD:codex/localize-fighter-assets
